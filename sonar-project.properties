############## BASIC PROJECT INFO ##############
sonar.projectKey=it-helpdesk
sonar.projectName=IT Helpdesk
sonar.projectVersion=1.0
sonar.sourceEncoding=UTF-8

############## SOURCE CODE SETUP ##############
sonar.sources=app,bootstrap,config,database,routes,resources

# EXCLUDE folders that should NOT be scanned
sonar.exclusions=\
vendor/**,\
node_modules/**,\
storage/**,\
public/**,\
resources/js/**/*.spec.js,\
resources/js/**/*.test.js,\
resources/views/**/*.blade.php

############## PHP SETTINGS ##############
sonar.php.file.suffixes=.php

############## JAVASCRIPT / VUE SETTINGS ##############
sonar.javascript.file.suffixes=.js,.vue
sonar.typescript.tsconfigPaths=resources/js/tsconfig.json

# OPTIONAL — enable if you have lcov or phpunit coverage later
# sonar.php.coverage.reportPaths=coverage.xml
# sonar.javascript.l

############## DISABLE ALL COVERAGE ##############
# Jangan pakai PHP coverage
sonar.php.coverage.reportPaths=

# Jangan pakai JavaScript coverage
sonar.javascript.lcov.reportPaths=

# Jangan pakai test coverage sama sekali
sonar.coverage.exclusions=*
